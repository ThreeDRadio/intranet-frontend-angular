name: Pull request checks

on:
  pull_request:
    branches: [master, main]
  workflow_dispatch:

jobs:
  pull-request-checks:
    # Use ubuntu-20.04 or ubuntu-22.04 because newer environments drop support for legacy binaries.
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm" # Speeds up subsequent workflow runs

      - name: Install Dependencies
        run: npm ci

      - name: Run Angular Lint with reviewdog
        uses: reviewdog/action-eslint@v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          reporter: github-pr-check
          level: error
          eslint_flags: "."

      - name: Run Prettier with reviewdog
        uses: EPMatt/reviewdog-action-prettier@v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          reporter: github-pr-check
          level: error
          filter_mode: added # Only checks lines changed/added in the PR

      - name: Run Angular Tests
        run: npm run test
