server {
    listen 443 ssl;
    server_name localhost;
    ssl_certificate_key /etc/nginx/ssl/ssl.key/server.key;
    ssl_certificate /etc/nginx/ssl/ssl.cert/server.crt;
    return       404;

    root /usr/share/nginx/html;
    index index.html;

    # Handle compression for better performance
    gzip on;
    gzip_min_length 1000;
    gzip_proxied any;
    gzip_types text/plain text/css application/json application/javascript application/x-javascript text/xml application/xml application/xml+rss text/javascript;

    location / {
        # This is the magic line for SPAs
        # It attempts to serve the file, then the directory,
        # and finally falls back to index.html
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets for a long time
    location ~* \.(?:ico|css|js|gif|jpe?g|png|woff2?|eot|ttf|svg)$ {
        expires 6M;
        access_log off;
        add_header Cache-Control 'public';
    }

    # Error handling
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
