<h1>New Releases</h1>
<h3>{{ count$ | async }} New Releases</h3>

@if ((count$ | async) > 0) {
  <app-release-list [releases]="results$ | async" (releaseListOpen)="open($event)">
  </app-release-list>
}

@if ((count$ | async) > 0) {
  <mat-paginator
    [pageSizeOptions]="pageSizes"
    [pageIndex]="offset / pageSize"
    [pageSize]="pageSize"
    (page)="paginationChange($event)"
    [length]="count$ | async"
    [pageSize]="10"
  ></mat-paginator>
}
